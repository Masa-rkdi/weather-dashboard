<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>気象データ UI - 最終完成版</title>
    
    <!-- 1. Chart.js (グラフ用ライブラリ) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- 2. Odometer.js (数字回転アニメーション用ライブラリとCSS) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.8/themes/odometer-theme-minimal.min.css" />
    <script>
        // 設定を変更: 整数のみの指定にし、カンマ区切りをなくす
        window.odometerOptions = {
            format: '(d)'
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.8/odometer.min.js"></script>

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 40px 20px; background-color: #f0f2f5; color: #333; margin: 0; }
        h1 { text-align: center; color: #2c3e50; font-weight: 700; margin-bottom: 40px; }

        .dashboard-container {
            display: flex; gap: 24px; justify-content: center; max-width: 900px; margin: 0 auto 30px auto;
        }

        .data-card {
            background-color: #ffffff; border-radius: 20px; padding: 30px 20px; text-align: center; flex: 1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); transition: transform 0.3s ease;
        }
        .data-card:hover { transform: translateY(-5px); }

        .data-label { font-size: 16px; color: #7f8c8d; margin-bottom: 15px; font-weight: 500; }

        /* 数値のスタイル。Odometerライブラリに合わせて少し調整 */
        .data-value {
            font-size: 48px; font-weight: 700; color: #1a73e8;
            display: flex; justify-content: center; align-items: baseline;
        }
        
        /* 小数点のドット用のスタイル */
        .decimal-point {
            font-size: 40px; margin: 0 2px;
        }

        .unit { font-size: 20px; color: #95a5a6; margin-left: 8px; font-weight: normal; }

        .chart-card {
            background-color: #ffffff; border-radius: 20px; padding: 30px; max-width: 900px;
            margin: 0 auto 40px auto; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .dashboard-container { flex-direction: column; }
            .chart-card { padding: 15px; }
        }
    </style>
</head>
<body>
    <h1>気象データ モニタリング</h1>

    <div class="dashboard-container">
        <div class="data-card">
            <div class="data-label">温度</div>
            <div class="data-value">
                <!-- 整数部と小数部を分割しました -->
                <span id="temp-int" class="odometer">00</span>
                <span class="decimal-point">.</span>
                <span id="temp-dec" class="odometer">0</span>
                <span class="unit">℃</span>
            </div>
        </div>
        <div class="data-card">
            <div class="data-label">湿度</div>
            <div class="data-value">
                <span id="hum-int" class="odometer">00</span>
                <span class="decimal-point">.</span>
                <span id="hum-dec" class="odometer">0</span>
                <span class="unit">%</span>
            </div>
        </div>
        <div class="data-card">
            <div class="data-label">気圧</div>
            <div class="data-value">
                <span id="pres-int" class="odometer">0000</span>
                <span class="decimal-point">.</span>
                <span id="pres-dec" class="odometer">0</span>
                <span class="unit">hPa</span>
            </div>
        </div>
    </div>

    <div class="chart-card">
        <canvas id="tempChart"></canvas>
    </div>

    <script>
        // --- グラフの初期設定 ---
        const timeLabels = []; 
        const tempHistory = []; 

        const ctx = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(ctx, {
            type: 'line', 
            data: {
                labels: timeLabels, 
                datasets: [{
                    label: '温度推移 (℃)', data: tempHistory, 
                    borderColor: '#1a73e8', backgroundColor: 'rgba(26, 115, 232, 0.1)', 
                    
                    fill: false, 
                    borderWidth: 2, 
                    tension: 0, 
                    pointRadius: 0, 
                    pointHoverRadius: 4, 
                    pointBackgroundColor: '#ffffff', pointBorderColor: '#1a73e8'
                }]
            },
            options: {
                responsive: true, animation: false,
                scales: { y: { suggestedMin: 20, suggestedMax: 30 } }
            }
        });

        // --- データの更新処理 ---
        function updateData() {
            const channelID = "3428859"; 
            const readAPIKey = "1AHL37VI4W1BSVZ1";
            
            // results=180 で過去1時間分(20秒間隔×180回)のデータを一括取得
            const url = `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPIKey}&results=180`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.feeds.length === 0) return;

                    // グラフ用の配列を毎回空にして、取得した全データを入れ直す
                    timeLabels.length = 0;
                    tempHistory.length = 0;

                    // 全データをループ処理してグラフ用配列を構築
                    data.feeds.forEach(feed => {
                        const temp = parseFloat(feed.field1);
                        if (!isNaN(temp)) {
                            // ThingSpeakの時間はUTCなので、日本時間に変換してラベルにする
                            const date = new Date(feed.created_at);
                            const timeString = String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
                            
                            timeLabels.push(timeString);
                            tempHistory.push(temp.toFixed(1));
                        }
                    });

                    // --- Odometer (UI) の更新処理 ---
                    // 取得したデータ配列の一番最後（最新のデータ）を取り出す
                    const latestFeed = data.feeds[data.feeds.length - 1];
                    const newTemp = parseFloat(latestFeed.field1);
                    const newHum = parseFloat(latestFeed.field2);
                    const newPres = parseFloat(latestFeed.field3);
                    
                    if (!isNaN(newTemp)) {
                        const tempStr = newTemp.toFixed(1).split('.'); 
                        document.getElementById("temp-int").innerHTML = tempStr[0];
                        document.getElementById("temp-dec").innerHTML = tempStr[1];
                    }
                    if (!isNaN(newHum)) {
                        const humStr = newHum.toFixed(1).split('.');
                        document.getElementById("hum-int").innerHTML = humStr[0];
                        document.getElementById("hum-dec").innerHTML = humStr[1];
                    }
                    if (!isNaN(newPres)) {
                        const presStr = newPres.toFixed(1).split('.');
                        document.getElementById("pres-int").innerHTML = presStr[0];
                        document.getElementById("pres-dec").innerHTML = presStr[1];
                    }

                    // グラフを更新
                    tempChart.update();
                })
                .catch(error => {
                    console.error('通信エラー:', error);
                });
        }

        function startAutoUpdate() {
            // ThingSpeakへの負荷を考慮し、更新間隔を20秒(20000ミリ秒)に設定します
            setInterval(updateData, 20000);
            // ページ読み込み直後にも1回実行しておく
            updateData();
        }

        // ページ読み込み完了時に自動的に更新処理をスタートさせる
        window.onload = startAutoUpdate;
    </script>
</body>
</html>
